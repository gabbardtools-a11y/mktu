name: 🚀 Deploy to VPS

# Триггеры: push в main (кроме docs/ и *.md) или ручной запуск
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
      - 'components.json'
      - 'ecosystem.config.cjs'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Причина ручного деплоя'
        required: false
        default: 'manual'

# Не запускать параллельные деплои — отменяем старый при новом пуше
concurrency:
  group: deploy-mktu
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_PORT: ${{ secrets.VPS_PORT || '22' }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # NEXT_PUBLIC_* переменные нужны при сборке
          NEXT_PUBLIC_SITE_URL: 'https://мкту.рус'

      - name: 📋 Prepare standalone bundle
        run: |
          # Next.js standalone: копируем static и public внутрь standalone
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          cp ecosystem.config.cjs .next/standalone/

          # Упаковываем
          cd .next/standalone
          tar -czf $GITHUB_WORKSPACE/mktu-deploy.tar.gz .

          # Размер для лога
          ls -lh $GITHUB_WORKSPACE/mktu-deploy.tar.gz

      - name: 📤 Upload tarball to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          source: mktu-deploy.tar.gz
          target: /tmp/
          timeout: 120s
          strip_components: 0

      - name: 🚀 Deploy on VPS (extract, env, pm2 reload)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          timeout: 120s
          script: |
            set -e
            TS=$(date +%Y%m%d-%H%M%S)
            BACKUP="/var/www/mktu.bak.$TS"
            REMOTE_TGZ="/tmp/mktu-deploy.tar.gz"

            echo "=== 1. Бэкап ==="
            if [ -d /var/www/mktu ]; then
              cp -r /var/www/mktu "$BACKUP"
              echo "✓ Бэкап: $BACKUP"
            fi

            echo "=== 2. Распаковка ==="
            cd /var/www/mktu
            rm -rf .next public server.js package.json node_modules ecosystem.config.cjs
            tar -xzf "$REMOTE_TGZ"
            rm -f "$REMOTE_TGZ"
            echo "✓ Распаковано"

            echo "=== 3. Запись .env ==="
            cat > /var/www/mktu/.env <<'ENVEOF'
            ROUTERAI_API_KEY=${{ secrets.ROUTERAI_API_KEY }}
            ROUTERAI_MODEL=openai/gpt-4o-mini
            DATABASE_URL=file:/var/www/mktu/db/custom.db
            NEXT_PUBLIC_SITE_URL=https://мкту.рус
            NEXT_TELEMETRY_DISABLED=1
            PORT=3000
            HOSTNAME=127.0.0.1
            ENVEOF
            chmod 600 /var/www/mktu/.env
            echo "✓ .env записан"

            echo "=== 4. PM2 reload ==="
            pm2 reload mktu || (cd /var/www/mktu && pm2 start ecosystem.config.cjs && pm2 save)
            pm2 save
            echo "✓ PM2 перезагружен"

            echo "=== 5. Ожидание прогрева (5 сек) ==="
            sleep 5

            echo "=== 6. Health check ==="
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/)
            echo "HTTP статус: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Деплой успешен — сайт отвечает 200"
            else
              echo "❌ Сайт не отвечает 200!"
              pm2 logs mktu --lines 30 --nostream
              exit 1
            fi

            echo ""
            echo "=== Готово ==="
            echo "Бэкап: $BACKUP"
            echo "Откат: rm -rf /var/www/mktu && mv $BACKUP /var/www/mktu && pm2 reload mktu"

      - name: ✅ Report success
        if: success()
        run: |
          echo "🎉 Деплой завершён успешно!"
          echo "🔗 https://мкту.рус"
          echo "📊 PM2: mktu (port 3000)"
          echo "⏱️  Время: ${{ steps.deploy.outcome }}"

      - name: ❌ Report failure
        if: failure()
        run: |
          echo "💔 Деплой упал!"
          echo "📋 Проверь логи выше"
          echo "🔄 Бэкап на VPS доступен: /var/www/mktu.bak.*"
          echo "🔄 Откат: ssh root@91.219.151.57 'rm -rf /var/www/mktu && mv /var/www/mktu.bak.LATEST /var/www/mktu && pm2 reload mktu'"
          exit 1
